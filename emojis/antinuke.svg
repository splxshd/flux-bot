<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="28" fill="#000"/>
  <!-- Sword blade -->
  <line x1="34" y1="94" x2="94" y2="34" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Crossguard -->
  <line x1="50" y1="78" x2="78" y2="50" stroke="none"/>
  <line x1="42" y1="60" x2="68" y2="86" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="34" y1="94" x2="22" y2="106" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="18" cy="110" r="7" fill="#fff"/>
  <!-- Lock body -->
  <rect x="70" y="54" width="36" height="28" rx="6"
