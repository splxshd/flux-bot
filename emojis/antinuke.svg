  <!-- Lock shackle -->
  <path d="M76 54 L76 44 C76 34 100 34 100 44 L100 54"
        fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="88" cy="66" r="4" fill="#fff"/>
  <line x1="88" y1="68" x2="88" y2="74" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
